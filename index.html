<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Events Finder (UI = f(state))</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="container">
      <h1>Chicago Events Finder</h1>

      <section class="controls" aria-label="Search and filters">
        <div class="row">
          <label for="q">Search</label>
          <input id="q" type="text" placeholder="Try: jazz, library, park…" />
        </div>

        <div class="row">
          <label class="row checkbox">
            <input id="freeOnly" type="checkbox" />
            Free only
          </label>

          <label for="sort">Sort</label>
          <select id="sort">
            <option value="dateAsc">Date (soonest first)</option>
            <option value="dateDesc">Date (latest first)</option>
          </select>
        </div>
      </section>

      <!-- a11y: status updates should be announced -->
      <p id="status" role="status" aria-live="polite" class="muted"></p>

      <section aria-label="Results">
        <ul id="results" class="results"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
